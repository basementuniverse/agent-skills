name: Deploy package skills into catalogue

on:
  workflow_call:
    inputs:
      scope:
        description: Package scope used for manifests/{scope}.json
        required: true
        type: string
    secrets:
      AGENT_SKILLS_TOKEN:
        description: Token with push/PR permissions on basementuniverse/agent-skills
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: basementuniverse/agent-skills
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate trigger and collect metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "This workflow must run from a tag push." >&2
            exit 1
          fi

          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" != *-skills ]]; then
            echo "Tag '$TAG' does not end with '-skills'." >&2
            exit 1
          fi

          # Enforce that the tagged commit is on main.
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tagged commit is not reachable from origin/main." >&2
            exit 1
          fi

          if [[ ! -d skills ]]; then
            echo "Source repository has no skills/ directory." >&2
            exit 1
          fi

          PACKAGE_VERSION=""
          if [[ -f package.json ]]; then
            PACKAGE_VERSION="$(jq -r '.version // ""' package.json)"
          fi

          SCOPE="${{ inputs.scope }}"
          SAFE_TAG="${TAG//\//-}"
          BRANCH="chore/skills-${SCOPE}-${SAFE_TAG}-${GITHUB_RUN_ID}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout catalogue repository
        uses: actions/checkout@v4
        with:
          repository: basementuniverse/agent-skills
          ref: main
          token: ${{ secrets.AGENT_SKILLS_TOKEN }}
          path: catalogue
          fetch-depth: 0

      - name: Sync skills and create manifest
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          DEST_SKILLS_DIR="catalogue/skills"
          MANIFEST_DIR="catalogue/manifests"
          MANIFEST_PATH="$MANIFEST_DIR/${{ steps.meta.outputs.scope }}.json"

          mkdir -p "$DEST_SKILLS_DIR" "$MANIFEST_DIR"

          mapfile -t SKILLS < <(find skills -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

          if [[ -f "$MANIFEST_PATH" ]]; then
            mapfile -t PREV_SKILLS < <(jq -r '.skills[]? // empty' "$MANIFEST_PATH")
            for skill in "${PREV_SKILLS[@]}"; do
              rm -rf "$DEST_SKILLS_DIR/$skill"
            done
          fi

          for skill in "${SKILLS[@]}"; do
            rm -rf "$DEST_SKILLS_DIR/$skill"
            rsync -a "skills/$skill/" "$DEST_SKILLS_DIR/$skill/"
          done

          if [[ ${#SKILLS[@]} -eq 0 ]]; then
            SKILLS_JSON='[]'
          else
            SKILLS_JSON="$(printf '%s\n' "${SKILLS[@]}" | jq -R . | jq -s .)"
          fi

          jq -n \
            --arg sourceRepository "${GITHUB_REPOSITORY}" \
            --arg sourceRef "${{ steps.meta.outputs.tag }}" \
            --arg sourceCommit "${GITHUB_SHA}" \
            --arg package "${{ steps.meta.outputs.scope }}" \
            --arg packageVersion "${{ steps.meta.outputs.package_version }}" \
            --argjson skills "$SKILLS_JSON" \
            '{
              sourceRepository: $sourceRepository,
              sourceRef: $sourceRef,
              sourceCommit: $sourceCommit,
              package: $package,
              packageVersion: $packageVersion,
              skills: $skills
            }' > "$MANIFEST_PATH"

          cd catalogue
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A skills "$MANIFEST_PATH"

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push branch
        if: steps.sync.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd catalogue

          BRANCH="${{ steps.meta.outputs.branch }}"
          git switch -c "$BRANCH"
          git commit -m "chore(skills): update ${{ steps.meta.outputs.scope }} from ${{ github.repository }}@${{ steps.meta.outputs.tag }}"
          git push --set-upstream origin "$BRANCH"

      - name: Open pull request
        if: steps.sync.outputs.has_changes == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENT_SKILLS_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ steps.meta.outputs.branch }}"
          SCOPE="${{ steps.meta.outputs.scope }}"
          TAG="${{ steps.meta.outputs.tag }}"

          PR_BODY="$(printf '%s\n' \
            '## Summary' \
            '' \
            "- sync skills/ from ${{ github.repository }}" \
            "- source ref: $TAG" \
            "- source commit: ${{ github.sha }}" \
            "- scope: $SCOPE" \
            "- manifest: manifests/$SCOPE.json" \
            '' \
            'This PR was generated automatically by the skills deployment workflow.'
          )"

          gh pr create \
            --repo "$TARGET_REPO" \
            --base main \
            --head "$BRANCH" \
            --title "Update skills for $SCOPE ($TAG)" \
            --body "$PR_BODY"

      - name: No changes notice
        if: steps.sync.outputs.has_changes != 'true'
        run: echo "No catalogue changes detected; skipping PR creation."
